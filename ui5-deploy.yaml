# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: capstone
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: S40
          url: https://s40lp1.ucc.cit.tum.de/
          client: '324'
        app:
          name: ZF15300
          package: ZSP26_GSP15_CAPSTONE
          transport: S40K917959
        exclude:
          - /test/
